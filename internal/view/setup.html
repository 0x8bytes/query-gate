<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>初始化 QueryGate</title>
<style>
  *{box-sizing:border-box}
  body{margin:0;font-family:ui-sans-serif,system-ui,-apple-system,"Segoe UI",sans-serif;
       background:#fafafa;color:#1a1a1a;display:flex;min-height:100vh;align-items:center;justify-content:center}
  .card{background:#fff;border:1px solid #ebebeb;border-radius:6px;padding:32px;width:320px}
  h1{font-size:18px;margin:0 0 4px}
  p.sub{color:#8a8a8a;font-size:13px;margin:0 0 20px}
  label{display:block;font-size:13px;margin-bottom:6px}
  input{width:100%;padding:9px 11px;border:1px solid #ebebeb;border-radius:6px;font-size:14px;margin-bottom:16px}
  input:focus{outline:none;border-color:#2563eb}
  button{width:100%;padding:9px;background:#2563eb;color:#fff;border:0;border-radius:6px;font-size:14px;cursor:pointer}
  button:hover{background:#1d4ed8}
  .err{color:#dc2626;font-size:13px;margin-bottom:12px}
</style>
</head>
<body>
  <form class="card" method="post" action="/setup">
    <h1>初始化 QueryGate</h1>
    <p class="sub">创建第一个超级管理员</p>
    {{if .Error}}<div class="err">请填写有效的用户名和密码</div>{{end}}
    <label>用户名</label>
    <input type="text" name="username" autofocus autocomplete="username">
    <label>密码</label>
    <input type="password" name="password" autocomplete="new-password">
    <button type="submit">创建</button>
  </form>
</body>
</html>
